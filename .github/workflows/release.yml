name: Release jpg2pdf

# Three trigger paths:
#   1. push to main / PR  -> ci job (build + smoke test, no release)
#   2. push tag v*        -> build matrix + publish GitHub Release
#   3. workflow_dispatch  -> manual: build+release for a tag, OR notes-only refresh
#
# Notes-only mode lets you refresh an existing release page (e.g. after editing
# CHANGELOG.md or the template) without rebuilding binaries.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v1.2.0). Required for manual runs."
        required: true
      notes_only:
        description: "Refresh release notes only (skip rebuild). Requires the release + assets to already exist."
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the release & upload assets

jobs:
  # -----------------------------------------------------------------------
  # CI: runs on every push to main and every PR. Builds the Linux binary and
  # smoke-tests it. Does NOT publish anything.
  # -----------------------------------------------------------------------
  ci:
    name: CI build (linux-x64)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Cairo (Linux)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/jpg2pdf/requirements.txt
          python -m pip install pyinstaller
      - name: Compile binary
        run: |
          pyinstaller --onefile --name jpg2pdf --console --noconfirm \
            --distpath dist tools/jpg2pdf/src/jpg2pdf.py
      - name: Smoke test --version
        run: ./dist/jpg2pdf --version
      - name: Verify version files in sync
        run: |
          FILE_VER="$(cat tools/jpg2pdf/VERSION | tr -d '[:space:]')"
          PY_VER="$(grep -oP '__version__\s*=\s*"\K[^"]+' tools/jpg2pdf/src/jpg2pdf.py)"
          CLI_VER="$(./dist/jpg2pdf --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          echo "VERSION file:   $FILE_VER"
          echo "__version__:    $PY_VER"
          echo "CLI --version:  $CLI_VER"
          if [ "$FILE_VER" != "$PY_VER" ] || [ "$PY_VER" != "$CLI_VER" ]; then
            echo "::error::Version mismatch — VERSION, __version__, and CLI output must match."
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Build matrix: only on tag push or manual dispatch (non-notes-only).
  # -----------------------------------------------------------------------
  build:
    name: Build (${{ matrix.label }})
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.notes_only != 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            asset: jpg2pdf-windows-x64.exe
            ext: .exe
          - os: ubuntu-latest
            label: linux-x64
            asset: jpg2pdf-linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            label: linux-arm64
            asset: jpg2pdf-linux-arm64
            ext: ""
          - os: macos-13
            label: macos-x64
            asset: jpg2pdf-macos-x64
            ext: ""
          - os: macos-14
            label: macos-arm64
            asset: jpg2pdf-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Cairo (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install Cairo (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo pkg-config
      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/jpg2pdf/requirements.txt
          python -m pip install pyinstaller
      - name: Compile binary
        shell: bash
        run: |
          pyinstaller --onefile --name jpg2pdf --console --noconfirm \
            --distpath dist tools/jpg2pdf/src/jpg2pdf.py
      - name: Rename artifact
        shell: bash
        run: mv "dist/jpg2pdf${{ matrix.ext }}" "dist/${{ matrix.asset }}"
      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          codesign --force --deep --sign - "dist/${{ matrix.asset }}"
          codesign --verify --verbose=2 "dist/${{ matrix.asset }}"
      - name: Smoke test
        shell: bash
        run: "./dist/${{ matrix.asset }} --version"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Release: runs on tag push or manual dispatch. Always re-renders notes
  # from the template + CHANGELOG and overwrites the release body.
  # -----------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build]
    # `always()` lets this run even when `build` is skipped (notes-only mode).
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      # Fast path: notes-only refresh. Pull existing assets from the live
      # release so checksums + asset list stay accurate.
      - name: Download existing release assets (notes-only mode)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.notes_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.name }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --clobber

      # Normal path: collect freshly-built artifacts.
      - name: Download all artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.notes_only != 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          # Skip pre-existing SHA256SUMS.txt and installer scripts when re-hashing
          rm -f SHA256SUMS.txt
          sha256sum jpg2pdf-* > SHA256SUMS.txt

      - name: List artifacts
        run: ls -la dist

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          BODY=""
          if [ -f CHANGELOG.md ]; then
            BODY=$(awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md)
          fi
          if [ -z "${BODY// }" ]; then
            BODY="No changelog entry found for ${TAG}."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Render release notes
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          COMMIT_FULL="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_FULL:0:10}"
          BUILD_DATE_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          PYTHON_VERSION="3.12"
          BRANCH="release/${TAG}"
          REPO="${{ github.repository }}"
          CHECKSUMS="$(cat dist/SHA256SUMS.txt)"

          export TAG COMMIT_FULL COMMIT_SHORT BUILD_DATE_UTC PYTHON_VERSION BRANCH REPO CHECKSUMS
          export CHANGELOG=${{ toJSON(steps.changelog.outputs.body) }}

          python3 - <<'PY' > dist/RELEASE_NOTES.md
          import os, pathlib
          tpl = pathlib.Path(".github/release-notes-template.md").read_text()
          mapping = {
              "VERSION": os.environ["TAG"],
              "COMMIT_FULL": os.environ["COMMIT_FULL"],
              "COMMIT_SHORT": os.environ["COMMIT_SHORT"],
              "BRANCH": os.environ["BRANCH"],
              "BUILD_DATE_UTC": os.environ["BUILD_DATE_UTC"],
              "PYTHON_VERSION": os.environ["PYTHON_VERSION"],
              "REPO": os.environ["REPO"],
              "CHECKSUMS": os.environ["CHECKSUMS"],
              "CHANGELOG": os.environ["CHANGELOG"],
          }
          for k, v in mapping.items():
              tpl = tpl.replace("{{" + k + "}}", v)
          print(tpl, end="")
          PY

          echo "----- rendered release notes -----"
          cat dist/RELEASE_NOTES.md

      - name: Stage installer scripts
        run: |
          cp install.ps1 dist/install.ps1
          cp install.sh  dist/install.sh
          chmod +x dist/install.sh

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: jpg2pdf ${{ steps.tag.outputs.name }}
          body_path: dist/RELEASE_NOTES.md
          # Force-overwrite body and assets on every run so notes always reflect
          # the latest CHANGELOG.md + template, even on re-runs of an existing tag.
          append_body: false
          files: |
            dist/jpg2pdf-windows-x64.exe
            dist/jpg2pdf-linux-x64
            dist/jpg2pdf-linux-arm64
            dist/jpg2pdf-macos-x64
            dist/jpg2pdf-macos-arm64
            dist/SHA256SUMS.txt
            dist/install.ps1
            dist/install.sh
