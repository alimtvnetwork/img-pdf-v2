name: Release jpg2pdf

# Triggered by pushing a tag like v0.5.0, or manually.
# Builds standalone binaries on Windows / Linux / macOS via PyInstaller
# and attaches them to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to publish (e.g. v0.5.0). Required for manual runs."
        required: true

permissions:
  contents: write   # needed to create the release & upload assets

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            asset: jpg2pdf-windows-x64.exe
            ext: .exe
          - os: ubuntu-latest
            label: linux-x64
            asset: jpg2pdf-linux-x64
            ext: ""
          - os: ubuntu-24.04-arm   # free arm64 runner for public repos
            label: linux-arm64
            asset: jpg2pdf-linux-arm64
            ext: ""
          - os: macos-13           # Intel runner
            label: macos-x64
            asset: jpg2pdf-macos-x64
            ext: ""
          - os: macos-14           # Apple Silicon runner
            label: macos-arm64
            asset: jpg2pdf-macos-arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/jpg2pdf/requirements.txt
          python -m pip install pyinstaller

      - name: Compile binary
        shell: bash
        run: |
          pyinstaller --onefile --name jpg2pdf --console --noconfirm \
            --distpath dist tools/jpg2pdf/src/jpg2pdf.py

      - name: Rename artifact
        shell: bash
        run: |
          mv "dist/jpg2pdf${{ matrix.ext }}" "dist/${{ matrix.asset }}"

      # Ad-hoc codesign (no Apple Developer ID required). The binary will run,
      # but Gatekeeper still quarantines it on first download — users either
      # right-click → Open, or run: xattr -dr com.apple.quarantine ./jpg2pdf
      - name: Ad-hoc codesign (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          codesign --force --deep --sign - "dist/${{ matrix.asset }}"
          codesign --verify --verbose=2 "dist/${{ matrix.asset }}"

      - name: Smoke test
        shell: bash
        run: |
          "./dist/${{ matrix.asset }}" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: List artifacts
        run: ls -la dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: jpg2pdf ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            dist/jpg2pdf-windows-x64.exe
            dist/jpg2pdf-linux-x64
            dist/jpg2pdf-linux-arm64
            dist/jpg2pdf-macos-x64
            dist/jpg2pdf-macos-arm64
            dist/SHA256SUMS.txt
